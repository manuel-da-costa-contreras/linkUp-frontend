services:
  web:
    env_file:
      - .env.e2e
    build:
      context: .
      dockerfile: Dockerfile.e2e
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://host.docker.internal:3001}
      NEXT_PUBLIC_DEFAULT_ORG_ID: ${NEXT_PUBLIC_DEFAULT_ORG_ID:-acme}
      NEXT_PUBLIC_AUTH_ENABLED: ${NEXT_PUBLIC_AUTH_ENABLED:-true}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
    ports:
      - "3002:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  cypress:
    env_file:
      - .env.e2e
    image: cypress/included:15.13.0
    working_dir: /e2e
    depends_on:
      web:
        condition: service_healthy
    environment:
      CYPRESS_baseUrl: http://web:3000
      CYPRESS_email: ${E2E_EMAIL}
      CYPRESS_password: ${E2E_PASSWORD}
      E2E_EMAIL: ${E2E_EMAIL}
      E2E_PASSWORD: ${E2E_PASSWORD}
    volumes:
      - ./:/e2e
    command:
      [
        "cypress",
        "run",
        "--browser",
        "chrome",
        "--env",
        "email=${E2E_EMAIL},password=${E2E_PASSWORD}",
      ]
