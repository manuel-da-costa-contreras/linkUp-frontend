name: E2E (Cypress + Docker)

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env.e2e
        shell: bash
        run: |
          cat > .env.e2e << 'EOF'
          E2E_EMAIL=${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD=${{ secrets.E2E_PASSWORD }}
          NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_DEFAULT_ORG_ID=${{ secrets.NEXT_PUBLIC_DEFAULT_ORG_ID }}
          NEXT_PUBLIC_AUTH_ENABLED=true
          NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EOF

      - name: Run E2E in Docker
        run: docker compose -f docker-compose.e2e.yml --env-file .env.e2e up --build --abort-on-container-exit --exit-code-from cypress

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.e2e.yml --env-file .env.e2e down -v
