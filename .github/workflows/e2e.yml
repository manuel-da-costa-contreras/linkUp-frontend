name: E2E (Cypress + Docker)

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
      NEXT_PUBLIC_DEFAULT_ORG_ID: ${{ secrets.NEXT_PUBLIC_DEFAULT_ORG_ID }}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0
          required=(
            "E2E_EMAIL"
            "E2E_PASSWORD"
            "NEXT_PUBLIC_API_BASE_URL"
            "NEXT_PUBLIC_DEFAULT_ORG_ID"
            "NEXT_PUBLIC_FIREBASE_API_KEY"
            "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN"
            "NEXT_PUBLIC_FIREBASE_PROJECT_ID"
            "NEXT_PUBLIC_FIREBASE_APP_ID"
            "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID"
          )

          for key in "${required[@]}"; do
            value="${!key}"
            if [ -z "$value" ]; then
              echo "::error title=Missing secret::${key} is empty or undefined."
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Create .env.e2e
        shell: bash
        run: |
          {
            echo "E2E_EMAIL=${E2E_EMAIL}"
            echo "E2E_PASSWORD=${E2E_PASSWORD}"
            echo "CYPRESS_email=${E2E_EMAIL}"
            echo "CYPRESS_password=${E2E_PASSWORD}"
            echo "NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}"
            echo "NEXT_PUBLIC_DEFAULT_ORG_ID=${NEXT_PUBLIC_DEFAULT_ORG_ID}"
            echo "NEXT_PUBLIC_AUTH_ENABLED=true"
            echo "NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}"
            echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}"
            echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}"
            echo "NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}"
            echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}"
          } > .env.e2e

      - name: Run E2E in Docker
        run: docker compose -f docker-compose.e2e.yml --env-file .env.e2e up --build --abort-on-container-exit --exit-code-from cypress

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.e2e.yml --env-file .env.e2e down -v
